<!DOCTYPE html>
<html>
<head>
    <title>Contact Form</title>
</head>

<body>

<h2>Contact Us</h2>

<form action="#" method="post">

    <label>Enter your Name:</label><br>
    <input type="text" name="name" size="40"><br><br>

    <label>E-mail address:</label><br>
    <input type="email" name="email" size="40"><br><br>

    <label>Message Subject:</label><br>
    <input type="text" name="subject" size="40"><br><br>

    <label>Enter your Message:</label><br>
    <textarea name="message" rows="10" cols="50"></textarea><br><br>

    <input type="checkbox" name="copy">
    E-mail a copy of this message to your own address.<br><br>

    <input type="submit" value="Send">

</form>

</body>
</html>
